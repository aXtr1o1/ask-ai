name: CI/CD — Frontend tests & Backend deploy

on:
  push:
    branches:
      - Testing
  pull_request:
    branches:
      - Testing
  
jobs:
  # --- CI: test frontend only ---
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: nanosoft-ai-frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd nanosoft-ai-frontend
          npm ci --prefer-offline --no-audit || npm install

      - name: Run frontend tests
        run: |
          cd nanosoft-ai-frontend
          npm test -- --watchAll=false --passWithNoTests

  # --- CD: deploy backend to AWS t2.small (only on push, no PR) ---
  deploy-backend:
    needs: test-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/Testing'
    runs-on: ubuntu-latest
    # optional: add "environment: production" and set secrets on that env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "::error::Secret EC2_HOST is not set."; exit 1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "::error::Secret EC2_USER is not set."; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "::error::Secret EC2_SSH_KEY is not set."; exit 1; fi
          if [ -z "${{ secrets.EC2_APP_PATH }}" ]; then echo "::error::Secret EC2_APP_PATH is not set."; exit 1; fi
          echo "Required secrets are set."

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 2m
          envs: GH_DEPLOY_TOKEN=${{ secrets.GH_DEPLOY_TOKEN }},REPO_SLUG=${{ github.repository }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_PATH }}
            if [ -n "$GH_DEPLOY_TOKEN" ]; then
              git remote set-url origin "https://x-access-token:${GH_DEPLOY_TOKEN}@github.com/${REPO_SLUG}.git"
            fi
            git fetch origin
            git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}
            cd nanosoft-ai-backend
            python3 -m venv .venv 2>/dev/null || true
            . .venv/bin/activate
            pip install -q -r requirements.txt
            sudo systemctl restart nanosoft-backend || true
            sudo systemctl restart nanosoft-model || true



